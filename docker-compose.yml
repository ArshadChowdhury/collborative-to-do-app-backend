services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_api_service
    ports:
      - "3300:3300" # Matches your Dockerfile EXPOSE 3300
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3300
      - DB_HOST=db # Must match the service name below
    depends_on:
      db:
        condition: service_healthy
    networks:
      - todo_network

  db:
    image: postgres:15-alpine
    container_name: todo_db_service
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todo_network

networks:
  todo_network:
    driver: bridge

volumes:
  postgres_data: